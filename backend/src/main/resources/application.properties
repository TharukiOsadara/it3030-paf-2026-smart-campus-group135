# ============================================
# Smart Campus Operations Hub
# Application Properties (Main)
# ============================================

spring.application.name=smartcampus

# Load .env file if present
spring.config.import=optional:file:.env[.properties]

# ====================== Environment ======================
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# ====================== H2 Database ======================
spring.datasource.url=jdbc:h2:file:./data/smartcampus;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# ====================== JPA/Hibernate ======================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# ====================== MongoDB ======================
spring.mongodb.uri=${MONGODB_URI:mongodb+srv://admin:fuSHLOrhVYAfv6ez@cluster0.hpo1gtl.mongodb.net/smartcampus?retryWrites=true&w=majority&appName=Cluster0}
spring.mongodb.database=${MONGODB_DATABASE:smartcampus}

# ====================== Server ======================
server.port=${SERVER_PORT:8080}

# ====================== Security ======================
jwt.secret=${JWT_SECRET:your-secret-key-make-it-long-and-secure-at-least-32-characters-for-hs512}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ====================== Google OAuth2 ======================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri=${GOOGLE_REDIRECT_URI:http://localhost:8080/login/oauth2/code/google}

# ====================== OAuth2 Frontend URL ======================
oauth2.frontend.url=${FRONTEND_URL:http://localhost:5173}

# ====================== CORS ======================
app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

# ====================== File Upload ======================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:30MB}
file.upload-dir=${UPLOAD_DIR:uploads/}

# ====================== Logging ======================
logging.level.com.smartcampus=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.springframework.data.mongodb=DEBUG
logging.level.org.hibernate=ERROR
